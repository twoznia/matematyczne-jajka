<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Matematyczne Jajka v2.0</title>
    <style>
        body { 
            background: #eef2f3; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 10px; 
            overflow: hidden; 
            touch-action: none;
        }
        canvas { 
            background: white; 
            border: 4px solid #2c3e50; 
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            max-width: 100%; 
            height: auto; 
            cursor: none; 
        }
        h1 { color: #2c3e50; margin-bottom: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .stats-bar { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>Matematyczne Jajka v2.0</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- ZMIENNE GRY ---
        let punkty = 0, poprawne = 0, bledne = 0;
        let koszykX = 400, jajkaY = -50, predkosc = 3;
        let graAktywna = false; 
        let graStartowana = false;
        let zadanie = "", poprawnyWynik = 0, opcje = [];

        // --- LOGIKA MATEMATYCZNA ---
        function generujZadanie() {
            const operacje = ['+', '-', '*'];
            const op = operacje[Math.floor(Math.random() * 3)];
            let a, b, wynik;

            if (op === '+') { 
                a = Math.floor(Math.random() * 20) + 1; 
                b = Math.floor(Math.random() * 20) + 1; 
                wynik = a + b; 
            } else if (op === '-') { 
                a = Math.floor(Math.random() * 20) + 10; 
                b = Math.floor(Math.random() * a) + 1; 
                wynik = a - b; 
            } else { 
                a = Math.floor(Math.random() * 8) + 2; 
                b = Math.floor(Math.random() * 8) + 2; 
                wynik = a * b; 
            }

            // POPRAWIONE: ${op} zamiast {op}
            zadanie = `${a} ${op} ${b} = ?`; 
            poprawnyWynik = wynik;

            // Tworzenie 3 opcji (1 dobra, 2 błędne)
            opcje = [wynik];
            while(opcje.length < 3) {
                let falszywy = wynik + (Math.floor(Math.random() * 11) - 5);
                if (!opcje.includes(falszywy) && falszywy !== wynik) {
                    opcje.push(falszywy);
                }
            }
            opcje.sort(() => Math.random() - 0.5);
        }

        // --- STEROWANIE ---
        function sterowanie(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            if (e.touches) clientX = e.touches[0].clientX;
            
            koszykX = (clientX - rect.left) * (canvas.width / rect.width);
        }

        canvas.addEventListener("mousemove", sterowanie);
        canvas.addEventListener("touchmove", (e) => { e.preventDefault(); sterowanie(e); }, {passive: false});

        function klikniecie() {
            if (!graStartowana) {
                graStartowana = true;
                graAktywna = true;
                generujZadanie();
            } else if (!graAktywna) {
                // Reset gry
                punkty = 0; poprawne = 0; bledne = 0; predkosc = 3; jajkaY = -50;
                graAktywna = true;
                generujZadanie();
            }
        }

        canvas.addEventListener("mousedown", klikniecie);
        canvas.addEventListener("touchstart", klikniecie);

        // --- AKTUALIZACJA I RYSOWANIE ---
        function update() {
            if (!graAktywna) return;

            jajkaY += predkosc;

            // Sprawdzanie kolizji
            if (jajkaY > 520 && jajkaY < 580) {
                for (let i = 0; i < 3; i++) {
                    let xPos = (i + 1) * 200;
                    if (Math.abs(koszykX - xPos) < 60) {
                        if (opcje[i] === poprawnyWynik) {
                            punkty++; poprawne++; predkosc += 0.15;
                        } else {
                            punkty--; bledne++;
                        }
                        jajkaY = -50;
                        generujZadanie();
                        break;
                    }
                }
            }

            // Jajka spadły na ziemię
            if (jajkaY > 600) {
                bledne++; punkty--; jajkaY = -50;
                generujZadanie();
            }

            // Warunki końca
            if (punkty >= 5 || punkty <= -5) {
                graAktywna = false;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 600);

            if (!graStartowana) {
                // EKRAN POWITALNY
                ctx.fillStyle = "#2c3e50";
                ctx.font = "bold 40px Arial";
                ctx.fillText("Matematyczne Jajka v2.0", 180, 200);
                
                ctx.font = "22px Arial";
                ctx.fillStyle = "#34495e";
                ctx.fillText("💻 PC: Ruszaj myszką, by łapać poprawne wyniki", 160, 280);
                ctx.fillText("📱 Telefon: Klikaj/Dotykaj pod spadającym jajkiem", 160, 320);
                
                ctx.fillStyle = "#27ae60";
                ctx.font = "bold 28px Arial";
                ctx.fillText("DOTKNIJ EKRANU, ABY ZACZĄĆ", 200, 420);

            } else if (graAktywna) {
                // INTERFEJS GRY
                ctx.fillStyle = "#333";
                ctx.font = "bold 50px Arial";
                ctx.fillText(zadanie, 300, 100);

                ctx.font = "24px Arial";
                ctx.fillText(`Wynik: ${punkty} | Dobrze: ${poprawne} | Źle: ${bledne}`, 20, 40);

                // JAJKA
                opcje.forEach((val, i) => {
                    let x = (i + 1) * 200;
                    // Cień jajka
                    ctx.fillStyle = "rgba(0,0,0,0.1)";
                    ctx.beginPath(); ctx.ellipse(x+3, jajkaY+3, 30, 40, 0, 0, Math.PI * 2); ctx.fill();
                    // Jajko
                    ctx.fillStyle = "#3498db";
                    ctx.beginPath(); ctx.ellipse(x, jajkaY, 30, 40, 0, 0, Math.PI * 2); ctx.fill();
                    // Liczba
                    ctx.fillStyle = "white"; ctx.font = "bold 26px Arial";
                    ctx.fillText(val, x - (ctx.measureText(val).width / 2), jajkaY + 10);
                });

                // KOSZYK
                ctx.fillStyle = "#27ae60";
                ctx.fillRect(koszykX - 60, 560, 120, 25);
                ctx.strokeStyle = "#1e8449"; ctx.lineWidth = 3;
                ctx.strokeRect(koszykX - 60, 560, 120, 25);

            } else {
                // EKRAN KOŃCOWY
                const wygrana = punkty >= 5;
                ctx.fillStyle = wygrana ? "#27ae60" : "#c0392b";
                ctx.font = "bold 60px Arial";
                ctx.fillText(wygrana ? "ZWYCIĘSTWO!" : "PRZEGRANA!", 180, 250);
                
                ctx.fillStyle = "#2c3e50"; ctx.font = "28px Arial";
                ctx.fillText(`Poprawne odpowiedzi: ${poprawne}`, 240, 320);
                ctx.fillText(`Błędne odpowiedzi: ${bledne}`, 240, 360);
                
                ctx.font = "bold 22px Arial";
                ctx.fillText("KLIKNIJ, ABY ZAGRAĆ PONOWNIE", 220, 450);
            }
            requestAnimationFrame(draw);
        }

        setInterval(update, 1000/60);
        draw();
    </script>
</body>
</html>
