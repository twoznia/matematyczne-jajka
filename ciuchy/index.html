<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Plażowa Ubieranka 3.0</title>
    <style>
        :root {
            --bg-sky: #87CEEB;
            --boy-skin: #ffdbac;
            --girl-skin: #f1c27d;
            --hair-color: #614126;
            --accent: #ff6b6b;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg-sky);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .ui-panel { display: flex; gap: 10px; margin-bottom: 10px; z-index: 100; }
        
        button {
            padding: 8px 15px; font-size: 0.9rem; cursor: pointer;
            border-radius: 15px; border: 2px solid #00796b;
            background: white; color: #00796b; font-weight: bold;
        }
        button.active { background: #00796b; color: white; }

        .game-area {
            display: flex; width: 100%; height: calc(100vh - 120px);
            gap: 15px; justify-content: center; max-width: 1200px;
        }

        /* SZAFA */
        .wardrobe {
            flex: 1.2; max-width: 380px; background: rgba(255, 255, 255, 0.9);
            border-radius: 20px; padding: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow-y: auto; z-index: 50;
        }

        .category-header {
            display: flex; justify-content: space-between; align-items: center;
            background: #e0f2f1; padding: 5px 10px; border-radius: 10px;
            font-size: 0.8rem; color: #004d40; font-weight: bold; margin-top: 10px;
        }

        .category-group {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0;
        }

        .clothing-item {
            aspect-ratio: 1/1; background: #fff; border: 2px solid #b2dfdb;
            border-radius: 12px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
        }
        
        .clothing-item:hover { border-color: var(--accent); }
        .clothing-item svg { width: 80%; height: 80%; }

        .btn-remove { background: #ff7675; color: white; border: none; border-radius: 5px; padding: 2px 8px; cursor: pointer; }

        /* POSTAĆ I TŁO */
        .doll-container {
            flex: 1.8; position: relative; border-radius: 25px;
            max-width: 600px; display: flex; justify-content: center; overflow: hidden;
            background: linear-gradient(to bottom, #4fc3f7 0%, #4fc3f7 50%, #00acc1 50%, #00acc1 70%, #ffe082 70%);
        }

        /* Palma w tle */
        .decoration { position: absolute; bottom: 30%; right: 5%; width: 100px; opacity: 0.8; z-index: 1; }

        #character-svg { height: 90%; width: auto; margin-top: 5%; z-index: 10; position: relative; }
        
        .skin { fill: var(--boy-skin); transition: fill 0.3s; }
        #hair-girl { display: none; fill: var(--hair-color); }
        .dressed-item { pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <button id="btn-boy" class="active" onclick="setGender('boy')">Chłopiec 👦</button>
        <button id="btn-girl" onclick="setGender('girl')">Dziewczynka 👧</button>
    </div>

    <div class="game-area">
        <div class="wardrobe" id="wardrobe-content"></div>

        <div class="doll-container">
            <svg class="decoration" viewBox="0 0 100 100">
                <path d="M50 100 Q40 50 50 20" stroke="#6d4c41" stroke-width="8" fill="none"/>
                <path d="M50 20 Q20 20 10 40 M50 20 Q80 20 90 40 M50 20 Q50 0 30 -10 M50 20 Q50 0 70 -10" stroke="#4caf50" stroke-width="5" fill="none"/>
            </svg>

            <svg id="character-svg" viewBox="0 0 300 400">
                <g id="hair-girl">
                    <path d="M110 80 Q100 150 100 230 Q150 250 200 230 Q200 150 190 80" fill="var(--hair-color)"/>
                    <circle cx="150" cy="70" r="45" fill="var(--hair-color)"/>
                </g>
                
                <g id="body-base">
                    <circle class="skin" cx="150" cy="80" r="35"/>
                    <rect class="skin" x="145" y="110" width="10" height="15"/>
                    <rect class="skin" x="125" y="125" width="50" height="90" rx="15"/>
                    <path class="skin" d="M125 140 L95 210 Q95 215 100 215 L105 215 L125 160" /> 
                    <path class="skin" d="M175 140 L205 210 Q205 215 200 215 L195 215 L175 160" />
                    <circle class="skin" cx="100" cy="215" r="8"/> 
                    <circle class="skin" cx="200" cy="215" r="8"/> 
                    <rect class="skin" x="130" y="215" width="16" height="115" rx="8"/>
                    <rect class="skin" x="154" y="215" width="16" height="115" rx="8"/>
                    <ellipse class="skin" cx="130" cy="335" rx="14" ry="7"/> 
                    <ellipse class="skin" cx="170" cy="335" rx="14" ry="7"/> 
                </g>

                <g id="slot-full" class="dressed-item"></g>
                <g id="slot-legs" class="dressed-item"></g>
                <g id="slot-torso" class="dressed-item"></g>
                <g id="slot-head" class="dressed-item"></g>
                <g id="slot-feet" class="dressed-item"></g>

                <circle cx="140" cy="75" r="2.5" fill="black"/>
                <circle cx="160" cy="75" r="2.5" fill="black"/>
                <path d="M140 95 Q150 105 160 95" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <script>
        const categories = {
            head: { label: "CZAPKI", vb: "110 30 80 60" },
            torso: { label: "GÓRA", vb: "90 120 120 100" },
            full: { label: "SUKIENKI / STROJE", vb: "90 120 120 190" },
            legs: { label: "DÓŁ", vb: "110 210 80 110" },
            feet: { label: "BUTY", vb: "110 310 80 50" }
        };

        const library = [
            { type: 'head', color: '#ffeb3b', svg: '<path d="M115 75 L115 45 L132 65 L150 40 L168 65 L185 45 L185 75 Z" fill="TARGET" stroke="#fbc02d"/>' },
            { type: 'head', color: '#ff7043', svg: '<path d="M120 70 C120 35, 180 35, 180 70 Z" fill="TARGET"/><path d="M175 65 L210 75 L180 85 Z" fill="TARGET"/>' },
            { type: 'head', color: '#4fc3f7', svg: '<path d="M120 75 Q120 40 150 40 Q180 40 180 75 Z" fill="TARGET"/><circle cx="150" cy="35" r="8" fill="white"/>' },
            { type: 'head', color: '#ffffff', svg: '<ellipse cx="150" cy="70" rx="40" ry="15" fill="TARGET" stroke="#ddd"/><path d="M125 70 Q125 40 150 40 Q175 40 175 70" fill="TARGET" stroke="#ddd"/>' },

            { type: 'torso', color: '#ff8a65', svg: '<path d="M125 125 H175 L180 155 L160 155 L160 215 H140 L140 155 L120 155 Z M125 125 L95 180 L105 185 L125 145 Z M175 125 L205 180 L195 185 L175 145 Z" fill="TARGET"/>' },
            { type: 'torso', color: '#4db6ac', svg: '<path d="M125 125 H175 L185 210 H115 Z M125 125 L95 180 L110 185 L125 145 Z M175 125 L205 180 L190 185 L175 145 Z" fill="TARGET"/>' },
            { type: 'torso', color: '#ce93d8', svg: '<path d="M125 125 H175 L180 155 L160 155 L160 215 H140 L140 155 L120 155 Z M125 125 L95 155 L110 160 L125 140 Z M175 125 L205 155 L190 160 L175 140 Z" fill="TARGET"/>' },

            { type: 'full', color: '#f06292', svg: '<path d="M130 125 H170 L205 310 H95 Z" fill="TARGET"/><path d="M130 125 Q150 145 170 125" fill="none" stroke="white" stroke-width="3"/>' },
            { type: 'full', color: '#ba68c8', svg: '<path d="M130 125 H170 L210 290 Q150 315 90 290 Z" fill="TARGET"/><circle cx="150" cy="180" r="15" fill="white" opacity="0.3"/>' },
            { type: 'full', color: '#4caf50', svg: '<path d="M125 130 H175 V215 H125 Z M130 215 H145 V240 H130 Z M155 215 H170 V240 H155 Z" fill="TARGET"/>' },

            { type: 'legs', color: '#1e88e5', svg: '<path d="M125 210 H175 L182 320 H155 L150 260 L145 320 H118 Z" fill="TARGET"/>' },
            { type: 'legs', color: '#8d6e63', svg: '<path d="M125 210 H175 L180 270 H120 Z" fill="TARGET"/>' },
            { type: 'legs', color: '#26a69a', svg: '<path d="M125 210 H175 L180 280 H120 Z" fill="TARGET"/><rect x="120" y="270" width="60" height="5" fill="white" opacity="0.5"/>' },

            { type: 'feet', color: '#263238', svg: '<rect x="115" y="330" width="30" height="15" rx="5" fill="TARGET"/><rect x="155" y="330" width="30" height="15" rx="5" fill="TARGET"/>' },
            { type: 'feet', color: '#f44336', svg: '<path d="M115 330 H145 V345 H115 Z M155 330 H185 V345 H155 Z" fill="TARGET" stroke="white"/>' },
            { type: 'feet', color: '#8bc34a', svg: '<ellipse cx="130" cy="335" rx="15" ry="5" fill="TARGET"/><ellipse cx="170" cy="335" rx="15" ry="5" fill="TARGET"/>' }
        ];

        function init() {
            const wardrobe = document.getElementById('wardrobe-content');
            wardrobe.innerHTML = '';
            
            for (const [key, cat] of Object.entries(categories)) {
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `<span>${cat.label}</span><button class="btn-remove" onclick="removeCloth('${key}')">❌</button>`;
                wardrobe.appendChild(header);

                const group = document.createElement('div');
                group.className = 'category-group';
                
                library.filter(i => i.type === key).forEach(item => {
                    const box = document.createElement('div');
                    box.className = 'clothing-item';
                    const finalSvg = item.svg.replace(/TARGET/g, item.color);
                    box.innerHTML = `<svg viewBox="${cat.vb}">${finalSvg}</svg>`;
                    box.onclick = () => dress(key, finalSvg);
                    group.appendChild(box);
                });
                wardrobe.appendChild(group);
            }
        }

        function dress(type, svg) {
            if (type === 'full') { removeCloth('torso'); removeCloth('legs'); }
            else if (type === 'torso' || type === 'legs') { removeCloth('full'); }
            document.getElementById('slot-' + type).innerHTML = svg;
        }

        function removeCloth(type) { document.getElementById('slot-' + type).innerHTML = ''; }

        function setGender(g) {
            document.getElementById('btn-boy').className = g === 'boy' ? 'active' : '';
            document.getElementById('btn-girl').className = g === 'girl' ? 'active' : '';
            document.querySelectorAll('.skin').forEach(el => el.style.fill = g === 'boy' ? 'var(--boy-skin)' : 'var(--girl-skin)');
            document.getElementById('hair-girl').style.display = g === 'girl' ? 'block' : 'none';
        }

        init();
    </script>
</body>
</html>
