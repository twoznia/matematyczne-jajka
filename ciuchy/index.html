<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Plażowa Ubieranka 3.0</title>
    <style>
        :root {
            --bg-color: #e0f7fa; /* Błękitne niebo */
            --accent: #ff6b6b;
            --boy-skin: #ffdbac;
            --girl-skin: #f1c27d;
            --hair-color: #614126; /* Brązowe włosy */
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        h1 { color: #006064; margin: 5px 0; font-size: 1.2rem; text-shadow: 1px 1px white; }

        .ui-panel { display: flex; gap: 10px; margin-bottom: 10px; z-index: 10; }
        
        button {
            padding: 8px 15px; font-size: 0.9rem; cursor: pointer;
            border-radius: 15px; border: 2px solid #006064;
            background: white; color: #006064; font-weight: bold;
        }
        button.active { background: #006064; color: white; }

        .game-area {
            display: flex; width: 100%; height: calc(100vh - 120px);
            gap: 10px; justify-content: center; max-width: 1200px;
        }

        /* SZAFA - 2 KOLUMNY, WIĘCEJ RZĘDÓW */
        .wardrobe {
            flex: 1.2; max-width: 380px; background: rgba(255, 255, 255, 0.9);
            border-radius: 20px; padding: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow-y: auto; z-index: 5;
        }

        .category-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .category-header {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e0f2f1;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #004d40;
            font-weight: bold;
        }

        .btn-remove {
            background: #ff7675;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* MINIATURKA W SZAFIE */
        .clothing-item {
            aspect-ratio: 1/1;
            background: #fdfdfd;
            border: 2px solid #b2dfdb;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            overflow: hidden;
        }
        
        .clothing-item:hover { border-color: var(--accent); background: #fffafa; }
        .clothing-item svg { width: 85%; height: 85%; }

        /* POSTAĆ Z TŁEM PLAŻY */
        .doll-container {
            flex: 1.8; position: relative; 
            border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 600px; display: flex; justify-content: center;
            overflow: hidden;
        }

        /* RYSUNEK PLAŻY SVG */
        .beach-bg {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 0;
        }

        #character-svg { height: 95%; width: auto; margin-top: 2%; z-index: 1; position: relative; }
        
        /* Style postaci */
        .skin { fill: var(--boy-skin); transition: fill 0.3s; }
        #hair-girl { display: none; fill: var(--hair-color); }
        .hair { fill: var(--hair-color); }
        
        .dressed-item { pointer-events: none; }
    </style>
</head>
<body>

    <h1>Aloha! Plażowa Ubieranka ☀️🌴</h1>

    <div class="ui-panel">
        <button id="btn-boy" class="active" onclick="setGender('boy')">Chłopiec 👦</button>
        <button id="btn-girl" onclick="setGender('girl')">Dziewczynka 👧</button>
    </div>

    <div class="game-area">
        <div class="wardrobe" id="wardrobe-content">
            </div>

        <div class="doll-container">
            <svg class="beach-bg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
                <defs>
                    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#4fc3f7"/>
                        <stop offset="100%" stop-color="#b3e5fc"/>
                    </linearGradient>
                </defs>
                <rect width="100" height="100" fill="url(#skyGrad)"/>
                <circle cx="85" cy="15" r="8" fill="#fff176"/>
                <rect y="45" width="100" height="30" fill="#00acc1"/>
                <path d="M0 46 Q25 42 50 46 Q75 50 100 46 V50 H0 Z" fill="#4dd0e1" opacity="0.6"/>
