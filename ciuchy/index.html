<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Szafa Malucha 2.0</title>
    <style>
        :root {
            --bg-color: #fff5f5;
            --accent: #ff6b6b;
            --boy-skin: #ffdbac;
            --girl-skin: #f1c27d;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .ui-panel { display: flex; gap: 10px; margin-bottom: 10px; }
        
        button {
            padding: 10px 15px; font-size: 0.9rem; cursor: pointer;
            border-radius: 15px; border: 2px solid var(--accent);
            background: white; color: var(--accent); font-weight: bold;
        }
        button.active { background: var(--accent); color: white; }

        .game-area {
            display: flex; width: 100%; height: calc(100vh - 120px);
            gap: 15px; justify-content: center; max-width: 1100px;
        }

        /* SZAFA - 2 KOLUMNY */
        .wardrobe {
            flex: 1.2; max-width: 350px; background: white;
            border-radius: 20px; padding: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        .category-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .category-header {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff0f0;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #d63031;
            font-weight: bold;
        }

        .btn-remove {
            background: #ff7675;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* MINIATURKA W SZAFIE */
        .clothing-item {
            aspect-ratio: 1/1;
            background: #fdfdfd;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            overflow: hidden;
        }
        
        .clothing-item:hover { border-color: var(--accent); background: #fffafa; }
        .clothing-item svg { width: 85%; height: 85%; }

        /* POSTAĆ */
        .doll-container {
            flex: 1.5; position: relative; background: white;
            border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            max-width: 450px; display: flex; justify-content: center;
        }

        #character-svg { height: 95%; width: auto; margin-top: 2%; }
        .skin { fill: var(--boy-skin); transition: fill 0.3s; }
        #hair-girl { display: none; fill: #4b2c20; }
        .dressed-item { pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <button id="btn-boy" class="active" onclick="setGender('boy')">Chłopiec 👦</button>
        <button id="btn-girl" onclick="setGender('girl')">Dziewczynka 👧</button>
    </div>

    <div class="game-area">
        <div class="wardrobe" id="wardrobe-content">
            </div>

        <div class="doll-container">
            <svg id="character-svg" viewBox="0 0 300 400">
                <path id="hair-girl" d="M110 70 Q110 150 100 220 M190 70 Q190 150 200 220 Q150 30 110 70" stroke-width="45" stroke-linecap="round"/>
                
                <g id="body-base">
                    <circle class="skin" cx="150" cy="80" r="35"/>
                    <rect class="skin" x="145" y="110" width="10" height="15"/>
                    <rect class="skin" x="125" y="125" width="50" height="90" rx="15"/>
                    <path class="skin" d="M125 140 L95 210 Q95 215 100 215 L105 215 L125 160" /> 
                    <path class="skin" d="M175 140 L205 210 Q205 215 200 215 L195 215 L175 160" />
                    <circle class="skin" cx="100" cy="215" r="8"/> 
                    <circle class="skin" cx="200" cy="215" r="8"/> 
                    <rect class="skin" x="130" y="215" width="16" height="115" rx="8"/>
                    <rect class="skin" x="154" y="215" width="16" height="115" rx="8"/>
                    <ellipse class="skin" cx="130" cy="335" rx="14" ry="7"/> 
                    <ellipse class="skin" cx="170" cy="335" rx="14" ry="7"/> 
                </g>

                <g id="slot-full" class="dressed-item"></g>
                <g id="slot-legs" class="dressed-item"></g>
                <g id="slot-torso" class="dressed-item"></g>
                <g id="slot-head" class="dressed-item"></g>
                <g id="slot-feet" class="dressed-item"></g>

                <circle cx="140" cy="75" r="2.5" fill="black"/>
                <circle cx="160" cy="75" r="2.5" fill="black"/>
                <path d="M140 95 Q150 105 160 95" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <script>
        const categories = {
            head: { label: "CZAPKI", vb: "110 30 80 60" },
            torso: { label: "BLUZKI", vb: "90 120 120 100" },
            full: { label: "SUKIENKI", vb: "90 120 120 190" },
            legs: { label: "SPODNIE", vb: "110 210 80 110" },
            feet: { label: "BUTY", vb: "110 310 80 50" }
        };

        const library = [
            { type: 'head', color: '#ff7675', svg: '<path d="M120 70 C120 35, 180 35, 180 70 Z" fill="TARGET"/><path d="M175 65 L205 75 L180 85 Z" fill="TARGET"/>' },
            { type: 'head', color: '#74b9ff', svg: '<path d="M120 75 Q120 35 150 35 Q180 35 180 75 Z" fill="TARGET"/><circle cx="150" cy="30" r="8" fill="white"/>' },
            { type: 'head', color: '#fab1a0', svg: '<ellipse cx="150" cy="68" rx="35" ry="12" fill="TARGET"/><circle cx="150" cy="55" r="5" fill="TARGET"/>' },
            { type: 'head', color: '#ffeaa7', svg: '<path d="M115 75 L115 45 L132 65 L150 40 L168 65 L185 45 L185 75 Z" fill="TARGET" stroke="#d6a01e"/>' },

            { type: 'torso', color: '#55efc4', svg: '<path d="M125 125 H175 L180 155 L160 155 L160 215 H140 L140 155 L120 155 Z M125 125 L95 180 L105 185 L125 145 Z M175 125 L205 180 L195 185 L175 145 Z" fill="TARGET"/>' },
            { type: 'torso', color: '#81ecec', svg: '<path d="M125 125 H175 L185 210 H115 Z M125 125 L95 200 L110 205 L125 150 Z M175 125 L205 200 L190 205 L175 150 Z" fill="TARGET"/><rect x="115" y="150" width="70" height="5" fill="white" opacity="0.3"/><rect x="115" y="170" width="70" height="5" fill="white" opacity="0.3"/>' },
            
            { type: 'full', color: '#fd79a8', svg: '<path d="M130 125 H170 L200 310 H100 Z" fill="TARGET"/><path d="M130 125 Q150 145 170 125" fill="none" stroke="white" stroke-width="4"/>' },
            { type: 'full', color: '#a29bfe', svg: '<path d="M130 125 H170 L210 290 Q150 315 90 290 Z" fill="TARGET"/><circle cx="150" cy="200" r="20" fill="white" opacity="0.2"/>' },

            { type: 'legs', color: '#0984e3', svg: '<path d="M125 210 H175 L182 320 H155 L150 260 L145 320 H118 Z" fill="TARGET"/>' },
            { type: 'legs', color: '#636e72', svg: '<path d="M125 210 H175 L180 280 H120 Z" fill="TARGET"/>' },
            { type: 'legs', color: '#e17055', svg: '<path d="M125 210 H175 L182 320 H155 L150 260 L145 320 H118 Z" fill="TARGET"/><rect x="135" y="270" width="10" height="20" fill="black" opacity="0.1"/><rect x="155" y="270" width="10" height="20" fill="black" opacity="0.1"/>' },

            { type: 'feet', color: '#2d3436', svg: '<rect x="115" y="330" width="30" height="15" rx="5" fill="TARGET"/><rect x="155" y="330" width="30" height="15" rx="5" fill="TARGET"/>' },
            { type: 'feet', color: '#d63031', svg: '<path d="M115 330 H145 V345 H115 Z M155 330 H185 V345 H155 Z" fill="TARGET" stroke="white" stroke-width="1"/>' }
        ];

        function init() {
            const wardrobe = document.getElementById('wardrobe-content');
            
            for (const [key, cat] of Object.entries(categories)) {
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `<span>${cat.label}</span><button class="btn-remove" onclick="removeCloth('${key}')">Zdejmij ❌</button>`;
                wardrobe.appendChild(header);

                const group = document.createElement('div');
                group.className = 'category-group';
                
                library.filter(i => i.type === key).forEach(item => {
                    const box = document.createElement('div');
                    box.className = 'clothing-item';
                    const finalSvg = item.svg.replace(/TARGET/g, item.color);
                    box.innerHTML = `<svg viewBox="${cat.vb}">${finalSvg}</svg>`;
                    box.onclick = () => dress(key, finalSvg);
                    group.appendChild(box);
                });
                wardrobe.appendChild(group);
            }
        }

        function dress(type, svg) {
            if (type === 'full') {
                removeCloth('torso');
                removeCloth('legs');
            } else if (type === 'torso' || type === 'legs') {
                removeCloth('full');
            }
            document.getElementById('slot-' + type).innerHTML = svg;
        }

        function removeCloth(type) {
            document.getElementById('slot-' + type).innerHTML = '';
        }

        function setGender(g) {
            document.getElementById('btn-boy').className = g === 'boy' ? 'active' : '';
            document.getElementById('btn-girl').className = g === 'girl' ? 'active' : '';
            document.querySelectorAll('.skin').forEach(el => el.style.fill = g === 'boy' ? 'var(--boy-skin)' : 'var(--girl-skin)');
            document.getElementById('hair-girl').style.display = g === 'girl' ? 'block' : 'none';
        }

        init();
    </script>
</body>
</html>
