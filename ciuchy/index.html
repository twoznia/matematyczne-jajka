<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Super Ubieranka</title>
    <style>
        :root {
            --bg-color: #fdf2f8;
            --panel-color: #ffffff;
            --boy-skin: #ffdbac;
            --girl-skin: #f1c27d;
            --hair-color: #4b2c20;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .ui-panel { display: flex; gap: 10px; margin-bottom: 10px; }
        
        button {
            padding: 10px 20px; font-size: 1rem; cursor: pointer;
            border-radius: 20px; border: 2px solid #db2777;
            background: white; color: #db2777; font-weight: bold;
        }
        button.active { background: #db2777; color: white; }

        .game-area {
            display: flex; width: 100%; height: calc(100vh - 120px);
            gap: 15px; justify-content: center;
        }

        /* Szafa */
        .wardrobe {
            flex: 1; max-width: 250px; background: white;
            border-radius: 20px; padding: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }

        .category-title {
            font-size: 0.8rem; color: #999; text-align: center;
            border-bottom: 2px solid #fce7f3; padding-bottom: 3px;
            margin-top: 10px; font-weight: bold;
        }

        .clothing-item {
            width: 100%; height: 80px; cursor: grab; touch-action: none;
            background: #fff9fb; border: 1px solid #fbcfe8; border-radius: 12px;
        }
        
        .clothing-item svg { width: 100%; height: 100%; }

        /* Postać */
        .doll-container {
            flex: 2; position: relative; background: white;
            border-radius: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            max-width: 450px; display: flex; justify-content: center;
        }

        #character-svg { height: 95%; margin-top: 2%; }

        .skin { fill: var(--boy-skin); transition: fill 0.3s; }
        #hair-girl { display: none; fill: var(--hair-color); }
        
        .dressed-item { pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <button id="btn-boy" class="active" onclick="setGender('boy')">Chłopiec 👦</button>
        <button id="btn-girl" onclick="setGender('girl')">Dziewczynka 👧</button>
    </div>

    <div class="game-area">
        <div class="wardrobe">
            <div class="category-title">CZAPKI</div>
            <div class="clothing-item" draggable="true" id="c_cap" data-type="head"><svg viewBox="110 35 80 60"><path d="M120 70 C120 40, 180 40, 180 70 Z" fill="#3b82f6"/><path d="M175 65 L205 75 L180 80 Z" fill="#2563eb"/></svg></div>
            <div class="clothing-item" draggable="true" id="c_winter" data-type="head"><svg viewBox="110 35 80 60"><path d="M125 75 Q125 40 150 40 Q175 40 175 75 Z" fill="#ef4444"/><circle cx="150" cy="35" r="8" fill="white"/></svg></div>
            <div class="clothing-item" draggable="true" id="c_crown" data-type="head"><svg viewBox="110 35 80 60"><path d="M120 75 L120 45 L135 60 L150 40 L165 60 L180 45 L180 75 Z" fill="#fbbf24" stroke="#d97706"/></svg></div>

            <div class="category-title">SUKIENKI</div>
            <div class="clothing-item" draggable="true" id="c_dress1" data-type="full"><svg viewBox="100 120 100 150"><path d="M130 120 L170 120 L195 260 L105 260 Z" fill="#ec4899"/><path d="M130 120 Q150 135 170 120" fill="none" stroke="white" stroke-width="3"/></svg></div>
            <div class="clothing-item" draggable="true" id="c_dress2" data-type="full"><svg viewBox="100 120 100 150"><path d="M130 120 L170 120 L200 250 L100 250 Z" fill="#8b5cf6"/><circle cx="150" cy="180" r="15" fill="#ede9fe" opacity="0.5"/></svg></div>

            <div class="category-title">GÓRA</div>
            <div class="clothing-item" draggable="true" id="c_tshirt" data-type="torso"><svg viewBox="100 120 100 80"><path d="M115 125 L185 125 L195 160 L175 160 L175 200 L125 200 L125 160 L105 160 Z" fill="#10b981"/></svg></div>
            
            <div class="category-title">DÓŁ</div>
            <div class="clothing-item" draggable="true" id="c_pants" data-type="legs"><svg viewBox="115 200 70 100"><path d="M125 200 L175 200 L180 300 L155 300 L150 250 L145 300 L120 300 Z" fill="#1e40af"/></svg></div>

            <div class="category-title">BUTY</div>
            <div class="clothing-item" draggable="true" id="c_shoes1" data-type="feet"><svg viewBox="105 310 90 40"><rect x="110" y="325" width="30" height="15" rx="5" fill="#1f2937"/><rect x="160" y="325" width="30" height="15" rx="5" fill="#1f2937"/></svg></div>
            <div class="clothing-item" draggable="true" id="c_shoes2" data-type="feet"><svg viewBox="105 310 90 40"><rect x="110" y="325" width="30" height="15" rx="5" fill="#f43f5e"/><rect x="160" y="325" width="30" height="15" rx="5" fill="#f43f5e"/></svg></div>
        </div>

        <div class="doll-container" id="drop-zone">
            <svg id="character-svg" viewBox="0 0 300 400">
                <path id="hair-girl" d="M120 80 Q120 150 110 200 M180 80 Q180 150 190 200 Q150 50 120 80" stroke-width="40" stroke-linecap="round" stroke="#4b2c20"/>

                <g id="body">
                    <circle class="skin" cx="150" cy="80" r="35"/> <rect class="skin" x="145" y="110" width="10" height="15"/> <rect class="skin" x="125" y="125" width="50" height="80" rx="15"/> <path class="skin" d="M125 140 L100 200" stroke-width="12" stroke-linecap="round" stroke="currentColor"/> <path class="skin" d="M175 140 L200 200" stroke-width="12" stroke-linecap="round" stroke="currentColor"/> <circle class="skin" cx="100" cy="205" r="7"/> <circle class="skin" cx="200" cy="205" r="7"/> <rect class="skin" x="130" y="205" width="15" height="110" rx="7"/> <rect class="skin" x="155" y="205" width="15" height="110" rx="7"/> <ellipse class="skin" cx="130" cy="325" rx="12" ry="6"/> <ellipse class="skin" cx="170" cy="325" rx="12" ry="6"/> </g>

                <g id="slot-head" class="dressed-item"></g>
                <g id="slot-torso" class="dressed-item"></g>
                <g id="slot-legs" class="dressed-item"></g>
                <g id="slot-feet" class="dressed-item"></g>
                <g id="slot-full" class="dressed-item"></g>

                <circle cx="140" cy="75" r="2" fill="black"/>
                <circle cx="160" cy="75" r="2" fill="black"/>
                <path d="M140 95 Q150 105 160 95" fill="none" stroke="black" stroke-width="2"/>
            </svg>
        </div>
    </div>

    <script>
        function setGender(g) {
            currentGender = g;
            document.getElementById('btn-boy').className = g === 'boy' ? 'active' : '';
            document.getElementById('btn-girl').className = g === 'girl' ? 'active' : '';
            document.querySelectorAll('.skin').forEach(el => el.style.fill = g === 'boy' ? 'var(--boy-skin)' : 'var(--girl-skin)');
            document.getElementById('hair-girl').style.display = g === 'girl' ? 'block' : 'none';
        }

        const items = document.querySelectorAll('.clothing-item');
        items.forEach(item => {
            item.onmousedown = (e) => startDrag(e, item);
            item.ontouchstart = (e) => startDrag(e, item);
        });

        function startDrag(e, item) {
            const type = item.dataset.type;
            const svgContent = item.innerHTML;
            
            // Prosta mechanika dla 6-latka: Kliknij aby ubrać
            dress(type, svgContent);
        }

        function dress(type, content) {
            if (type === 'full') {
                // Sukienka zdejmuje bluzkę i spodnie
                document.getElementById('slot-torso').innerHTML = '';
                document.getElementById('slot-legs').innerHTML = '';
                document.getElementById('slot-full').innerHTML = content;
            } else if (type === 'torso' || type === 'legs') {
                // Bluzka/spodnie zdejmują sukienkę
                document.getElementById('slot-full').innerHTML = '';
                document.getElementById('slot-' + type).innerHTML = content;
            } else {
                document.getElementById('slot-' + type).innerHTML = content;
            }
        }
    </script>
</body>
</html>
