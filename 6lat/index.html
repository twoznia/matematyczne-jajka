<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematyczna Wyspa</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div id="menu">
            <h1>🌟 Matematyczna Wyspa </h1>
            <p>Wybierz zakres liczb:</p>
            <div class="difficulty-options">
                <button onclick="startGame(10)">Do 10</button>
                <button onclick="startGame(20)">Do 20</button>
            </div>
        </div>

        <div id="game" class="hidden">
            <div class="stats">
                <span>Pytanie: <b id="question-num">1</b>/7</span> | 
                <span style="color: #4cd137;">✅ <span id="correct-count">0</span></span> | 
                <span style="color: #e84118;">❌ <span id="wrong-count">0</span></span>
            </div>
            <div id="question-box">
                <span id="num1">0</span> <span id="operator">+</span> <span id="num2">0</span> = ?
            </div>
            <div id="options-container"></div>
            <div id="feedback" style="height: 30px; margin: 10px; font-weight: bold;"></div>
        </div>

        <div id="summary" class="hidden">
            <h2>Koniec przygody! 🏆</h2>
            <p id="final-stats"></p>
            <button onclick="showMenu()">Zagraj jeszcze raz</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
