<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrigQuest RPG: Rozszerzenie</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #4ecca3; --secondary: #e94560; --bg: #1a1a2e; --card: #16213e; --text: #eeeeee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { max-width: 600px; width: 90%; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        
        /* Stats Bars */
        .bar-label { font-size: 0.8em; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .bar-outer { width: 100%; height: 10px; background: #0f3460; border-radius: 5px; margin-bottom: 15px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: var(--secondary); transition: 0.3s; }
        #xp-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.3s; }

        /* Question Area */
        .math-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; margin: 20px 0; font-size: 1.4em; }
        
        /* Grid for buttons */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .option-btn { padding: 15px; background: #0f3460; border: 2px solid transparent; border-radius: 10px; color: white; cursor: pointer; font-size: 1em; transition: 0.2s; }
        .option-btn:hover { background: #16213e; border-color: var(--primary); }
        .option-btn:active { transform: scale(0.95); }

        .shop { border-top: 1px solid #333; margin-top: 20px; padding-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .shop-btn { font-size: 0.7em; padding: 5px 10px; background: #393e46; border-radius: 5px; cursor: pointer; border: none; color: #aaa; }
        .shop-btn:hover { color: white; background: #4e4e4e; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats">
        <div class="bar-label"><span>POZIOM <span id="lvl">1</span></span> <span>XP: <span id="xp-val">0</span>/100</span></div>
        <div class="bar-outer"><div id="xp-fill"></div></div>
        
        <div class="bar-label"><span>BOSS: STRAŻNIK SINUSA</span> <span>HP: <span id="hp-val">100</span>%</span></div>
        <div class="bar-outer"><div id="hp-fill"></div></div>
    </div>

    <div class="math-box" id="question">
        \[ \sin\left(\frac{\pi}{3}\right) = ? \]
    </div>

    <div class="options-grid" id="options">
        </div>

    <p id="feedback" style="height: 20px; margin-top: 15px; font-weight: bold;"></p>

    <div class="shop">
        <button class="shop-btn" onclick="buyHeal()">❤️ ULECZ (50 XP)</button>
        <button class="shop-btn" onclick="showHint()">💡 PODPOWIEDŹ (20 XP)</button>
    </div>
</div>

<script>
    const database = [
        { q: "\\sin(\\pi/3)", opts: ["1/2", "\\sqrt{3}/2", "\\sqrt{2}/2", "1"], correct: 1, hint: "To 60 stopni." },
        { q: "\\cos(150^\\circ)", opts: ["1/2", "-1/2", "-\\sqrt{3}/2", "0"], correct: 2, hint: "II ćwiartka, cos(180-30)." },
        { q: "\\text{tg}(x) = 1 \\implies x = ?", opts: ["\\pi/2", "\\pi/4", "\\pi/6", "0"], correct: 1, hint: "Nachylenie 45 stopni." },
        { q: "\\sin(2x) = ?", opts: ["\\sin x \\cos x", "2\\sin x \\cos x", "\\cos^2 x - \\sin^2 x", "2\\sin x"], correct: 1, hint: "Wzór na podwojony kąt." },
        { q: "\\cos(\\pi)", opts: ["0", "1", "-1", "2\\pi"], correct: 2, hint: "Punkt (-1, 0) na kole." },
        { q: "\\sin^2 x + \\cos^2 x", opts: ["x", "\\tan x", "1", "0"], correct: 2, hint: "Jedynka trygonometryczna." },
        { q: "\\cos(2x)", opts: ["2\\cos x", "\\cos^2 x - \\sin^2 x", "1 - \\sin x", "\\sin(2x)"], correct: 1, hint: "Wzór na cos podwojonego kąta." },
        { q: "\\text{Okres } \\sin(2x)", opts: ["2\\pi", "\\pi", "\\pi/2", "4\\pi"], correct: 1, hint: "T = 2π / k." },
        { q: "\\sin(-x)", opts: ["\\sin x", "-\\sin x", "\\cos x", "-\\cos x"], correct: 1, hint: "Sinus jest funkcją nieparzystą." },
        { q: "\\text{tg}(x) \\cdot \\text{ctg}(x)", opts: ["0", "1", "-1", "x"], correct: 1, hint: "Z definicji tych funkcji." }
    ];

    let xp = 0;
    let lvl = 1;
    let hp = 100;
    let qIdx = 0;

    function renderQuestion() {
        const item = database[qIdx];
        document.getElementById('question').innerHTML = `\\[ ${item.q} \\]`;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        item.opts.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `\\( ${opt} \\)`;
            btn.onclick = () => check(index);
            optionsDiv.appendChild(btn);
        });
        
        MathJax.typeset();
    }

    function check(idx) {
        const feedback = document.getElementById('feedback');
        if (idx === database[qIdx].correct) {
            xp += 30;
            hp -= 10;
            feedback.style.color = "var(--primary)";
            feedback.innerText = "DOBRZE! -10 HP BOSSA";
            if (xp >= 100) { xp -= 100; lvl++; }
            qIdx = (qIdx + 1) % database.length;
            renderQuestion();
        } else {
            feedback.style.color = "var(--secondary)";
            feedback.innerText = "BŁĄD! SPRÓBUJ PONOWNIE";
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('xp-fill').style.width = xp + "%";
        document.getElementById('hp-fill').style.width = hp + "%";
        document.getElementById('xp-val').innerText = xp;
        document.getElementById('hp-val').innerText = hp;
        document.getElementById('lvl').innerText = lvl;

        if (hp <= 0) {
            document.getElementById('game-container').innerHTML = "<h1>🏆 WYGRAŁEŚ!</h1><p>Matura rozszerzona opanowana.</p><button onclick='location.reload()'>Jeszcze raz?</button>";
        }
    }

    function buyHeal() {
        if (xp >= 50) {
            xp -= 50;
            hp = Math.min(100, hp + 20);
            updateUI();
        }
    }

    function showHint() {
        if (xp >= 20) {
            xp -= 20;
            alert(database[qIdx].hint);
            updateUI();
        }
    }

    renderQuestion();
</script>

</body>
</html>
